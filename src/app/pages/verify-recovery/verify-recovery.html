<section class="page-header section">
  <div class="container">
    <h1 class="section-title">Reset <span class="gradient-text">Password</span></h1>
  </div>
</section>

<section class="section" style="padding-top: 0">
  <div class="container">
    <div class="recovery-card">
      <div *ngIf="loading && !sessionSet && !error" class="card-body">
        <p class="status-text">Verifying your recovery link...</p>
        <div class="spinner"></div>
      </div>

      <div *ngIf="error && !sessionSet" class="card-body">
        <div class="alert alert-error">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
          </svg>
          <p>{{ error }}</p>
        </div>
        <a routerLink="/" class="btn btn-primary">Return Home</a>
      </div>

      <div *ngIf="sessionSet && !message" class="card-body">
        <p class="status-text">Enter your new password below.</p>
        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="recovery-form">
          <div class="form-group">
            <label for="password">New Password</label>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="At least 8 characters"
              class="form-input"
            />
            <span
              class="field-error"
              *ngIf="passwordForm.controls.password.touched && passwordForm.controls.password.invalid"
            >
              Password must be at least 8 characters.
            </span>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              id="confirmPassword"
              type="password"
              formControlName="confirmPassword"
              placeholder="Repeat your password"
              class="form-input"
            />
          </div>
          <div class="alert alert-error" *ngIf="error">
            <p>{{ error }}</p>
          </div>
          <div class="alert alert-success" *ngIf="message">
            <p>{{ message }}</p>
          </div>
          <button type="submit" [disabled]="passwordForm.invalid || loading" class="btn btn-primary btn-lg">
            {{ loading ? 'Updating...' : 'Reset Password' }}
          </button>
        </form>
      </div>

      <div *ngIf="message" class="card-body">
        <div class="alert alert-success">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          <p>{{ message }}</p>
        </div>
        <a routerLink="/" class="btn btn-primary">Go Home</a>
      </div>
    </div>
  </div>
</section>
