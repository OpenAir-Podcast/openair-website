name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx ng build --base-href /openair-website/

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          npx angular-cli-ghpages --dir=dist/openair-website/browser --no-silent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
